<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mon Compte — ViteTonBillet</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/images/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/images/apple-touch-icon.png" />
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    .account-page { padding: 100px 0 60px; min-height: 100vh; }

    /* AUTH FORMS */
    .auth-container {
      max-width: 440px;
      margin: 0 auto;
    }
    .auth-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 40px 36px;
    }
    .auth-card h1 {
      font-size: 1.6rem;
      font-weight: 800;
      color: white;
      text-align: center;
      margin-bottom: 8px;
    }
    .auth-card .subtitle {
      text-align: center;
      color: var(--gray-400);
      font-size: 0.9rem;
      margin-bottom: 32px;
    }
    .auth-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 28px;
      background: rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 4px;
    }
    .auth-tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      border-radius: 10px;
      border: none;
      background: none;
      color: var(--gray-400);
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
    }
    .auth-tab.active {
      background: var(--primary);
      color: white;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--gray-400);
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      font-size: 0.9rem;
      font-family: inherit;
      outline: none;
      background: rgba(255,255,255,0.06);
      color: white;
      transition: border-color 0.2s;
    }
    .form-group input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .auth-btn {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
    }
    .auth-btn:hover {
      background: var(--primary-dark);
      box-shadow: 0 6px 24px rgba(59,130,246,0.3);
    }
    .auth-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .auth-error {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: #fca5a5;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 0.85rem;
      margin-bottom: 16px;
      display: none;
    }
    .auth-error.visible { display: block; }

    /* DASHBOARD */
    .dashboard { display: none; }
    .dashboard.visible { display: block; }
    .dash-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
      flex-wrap: wrap;
      gap: 16px;
    }
    .dash-header h1 {
      font-size: 1.8rem;
      font-weight: 800;
      color: white;
    }
    .dash-header .welcome {
      color: var(--gray-400);
      font-size: 0.9rem;
    }
    .dash-logout {
      padding: 8px 20px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.15);
      background: none;
      color: var(--gray-400);
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
    }
    .dash-logout:hover {
      border-color: rgba(239,68,68,0.5);
      color: #fca5a5;
    }

    /* ORDERS LIST */
    .orders-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: white;
      margin-bottom: 20px;
    }
    .orders-empty {
      text-align: center;
      padding: 48px 20px;
      color: var(--gray-500);
      font-size: 0.9rem;
    }
    .order-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 20px 24px;
      margin-bottom: 12px;
      transition: border-color 0.2s;
    }
    .order-card:hover {
      border-color: rgba(255,255,255,0.15);
    }
    .order-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      flex-wrap: wrap;
      gap: 8px;
    }
    .order-id {
      font-weight: 700;
      color: white;
      font-size: 0.95rem;
    }
    .order-date {
      color: var(--gray-500);
      font-size: 0.82rem;
    }
    .order-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .order-status.completed {
      background: rgba(34,197,94,0.15);
      color: #4ade80;
    }
    .order-status.pending {
      background: rgba(234,179,8,0.15);
      color: #facc15;
    }
    .order-status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }
    .order-products {
      margin-bottom: 12px;
    }
    .order-product {
      display: flex;
      justify-content: space-between;
      font-size: 0.88rem;
      color: var(--gray-300);
      padding: 4px 0;
    }
    .order-product-name { flex: 1; }
    .order-product-qty { color: var(--gray-500); margin: 0 12px; }
    .order-product-price { font-weight: 600; color: white; }
    .order-total {
      display: flex;
      justify-content: space-between;
      padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,0.08);
      font-weight: 800;
      color: white;
      font-size: 0.95rem;
    }
    .order-delivery {
      margin-top: 12px;
      background: rgba(59,130,246,0.08);
      border: 1px solid rgba(59,130,246,0.15);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.82rem;
      color: var(--primary-light);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    @media (max-width: 768px) {
      .account-page { padding: 80px 0 40px; }
      .auth-card { padding: 28px 20px; border-radius: 16px; }
      .auth-card h1 { font-size: 1.3rem; }
      .form-row { grid-template-columns: 1fr; }
      .dash-header h1 { font-size: 1.3rem; }
      .order-card { padding: 16px; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="header" id="header">
    <div class="container header-inner">
      <a href="/" class="logo">
        <img src="/images/logo.png" alt="ViteTonBillet" class="logo-mark-img" />
        <span class="logo-text">ViteTonBillet</span>
      </a>
      <nav class="nav">
        <a href="/#events">Programme</a>
        <a href="/#faq">FAQ</a>
        <a href="/#reviews">Avis</a>
      </nav>
      <a href="/cart.html" class="header-cart" id="headerCart" aria-label="Mon panier">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <span class="header-cart-count" id="cartCount" style="display:none">0</span>
      </a>
      <button class="menu-toggle" id="menuToggle" aria-label="Menu">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
    </div>
  </header>

  <div class="account-page">
    <div class="container">

      <!-- AUTH (LOGIN / REGISTER) -->
      <div id="authSection" class="auth-container">
        <div class="auth-card">
          <h1>Mon Compte</h1>
          <p class="subtitle">Connectez-vous pour suivre vos commandes</p>

          <div class="auth-tabs">
            <button class="auth-tab active" onclick="switchAuthTab('login')">Connexion</button>
            <button class="auth-tab" onclick="switchAuthTab('register')">Inscription</button>
          </div>

          <div class="auth-error" id="authError"></div>

          <!-- LOGIN FORM -->
          <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
              <label for="loginEmail">Email</label>
              <input type="email" id="loginEmail" placeholder="votre@email.com" required />
            </div>
            <div class="form-group">
              <label for="loginPassword">Mot de passe</label>
              <input type="password" id="loginPassword" placeholder="Votre mot de passe" required />
            </div>
            <button type="submit" class="auth-btn" id="loginBtn">Se connecter</button>
          </form>

          <!-- REGISTER FORM -->
          <form id="registerForm" style="display:none" onsubmit="handleRegister(event)">
            <div class="form-row">
              <div class="form-group">
                <label for="regFirstName">Prenom</label>
                <input type="text" id="regFirstName" placeholder="Prenom" />
              </div>
              <div class="form-group">
                <label for="regLastName">Nom</label>
                <input type="text" id="regLastName" placeholder="Nom" />
              </div>
            </div>
            <div class="form-group">
              <label for="regEmail">Email</label>
              <input type="email" id="regEmail" placeholder="votre@email.com" required />
            </div>
            <div class="form-group">
              <label for="regPhone">T&eacute;l&eacute;phone</label>
              <input type="tel" id="regPhone" placeholder="+33 6 XX XX XX XX" />
            </div>
            <div class="form-group">
              <label for="regPassword">Mot de passe</label>
              <input type="password" id="regPassword" placeholder="Minimum 6 caracteres" required minlength="6" />
            </div>
            <button type="submit" class="auth-btn" id="registerBtn">Cr&eacute;er mon compte</button>
          </form>
        </div>
      </div>

      <!-- DASHBOARD -->
      <div id="dashboardSection" class="dashboard">
        <div class="dash-header">
          <div>
            <h1>Mon Compte</h1>
            <p class="welcome">Bienvenue, <span id="dashUserName"></span></p>
          </div>
          <button class="dash-logout" onclick="handleLogout()">Se deconnecter</button>
        </div>

        <h3 class="orders-title">Mes commandes</h3>
        <div id="ordersList"></div>
      </div>

    </div>
  </div>

  <script>
    const TOKEN_KEY = 'vtb_token';
    const USER_KEY = 'vtb_user';

    // Check si deja connecte
    function getRedirectUrl() {
      const params = new URLSearchParams(window.location.search);
      return params.get('redirect') || null;
    }
    function doRedirect() {
      const url = getRedirectUrl();
      if (url) { window.location.href = decodeURIComponent(url); return true; }
      return false;
    }
    function init() {
      const token = localStorage.getItem(TOKEN_KEY);
      const user = localStorage.getItem(USER_KEY);
      if (token && user) {
        if (doRedirect()) return; // Si deja connecte et redirect demande, y aller
        showDashboard(JSON.parse(user));
        loadOrders(token);
      }
      // Si tab=register dans l'URL, afficher l'onglet inscription
      const params = new URLSearchParams(window.location.search);
      if (params.get('tab') === 'register') switchAuthTab('register');
      updateCartCount();
    }

    function switchAuthTab(tab) {
      document.querySelectorAll('.auth-tab').forEach(el => el.classList.remove('active'));
      document.getElementById('authError').className = 'auth-error';
      if (tab === 'login') {
        document.querySelectorAll('.auth-tab')[0].classList.add('active');
        document.getElementById('loginForm').style.display = '';
        document.getElementById('registerForm').style.display = 'none';
      } else {
        document.querySelectorAll('.auth-tab')[1].classList.add('active');
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('registerForm').style.display = '';
      }
    }

    function showError(msg) {
      const el = document.getElementById('authError');
      el.textContent = msg;
      el.className = 'auth-error visible';
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      btn.disabled = true;
      btn.textContent = 'Connexion...';
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('loginEmail').value,
            password: document.getElementById('loginPassword').value
          })
        });
        const data = await res.json();
        if (!res.ok) { showError(data.error); return; }
        localStorage.setItem(TOKEN_KEY, data.token);
        localStorage.setItem(USER_KEY, JSON.stringify(data.user));
        if (doRedirect()) return; // Retour à la page précédente
        showDashboard(data.user);
        loadOrders(data.token);
      } catch (err) {
        showError('Erreur de connexion');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Se connecter';
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      const btn = document.getElementById('registerBtn');
      btn.disabled = true;
      btn.textContent = 'Creation...';
      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('regEmail').value,
            password: document.getElementById('regPassword').value,
            firstName: document.getElementById('regFirstName').value,
            lastName: document.getElementById('regLastName').value,
            phone: document.getElementById('regPhone').value
          })
        });
        const data = await res.json();
        if (!res.ok) { showError(data.error); return; }
        localStorage.setItem(TOKEN_KEY, data.token);
        localStorage.setItem(USER_KEY, JSON.stringify(data.user));
        if (doRedirect()) return; // Retour à la page précédente
        showDashboard(data.user);
        loadOrders(data.token);
      } catch (err) {
        showError('Erreur lors de l\'inscription');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Creer mon compte';
      }
    }

    function showDashboard(user) {
      document.getElementById('authSection').style.display = 'none';
      document.getElementById('dashboardSection').classList.add('visible');
      document.getElementById('dashUserName').textContent = user.firstName || user.email;
    }

    function handleLogout() {
      localStorage.removeItem(TOKEN_KEY);
      localStorage.removeItem(USER_KEY);
      document.getElementById('authSection').style.display = '';
      document.getElementById('dashboardSection').classList.remove('visible');
    }

    async function loadOrders(token) {
      try {
        const res = await fetch('/api/auth/orders', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (!res.ok) {
          if (res.status === 401) { handleLogout(); return; }
          return;
        }
        const orders = await res.json();
        renderOrders(orders);
      } catch {}
    }

    function renderOrders(orders) {
      const container = document.getElementById('ordersList');
      if (orders.length === 0) {
        container.innerHTML = `
          <div class="orders-empty">
            <p>Aucune commande pour le moment.</p>
            <p style="margin-top:8px"><a href="/#events" style="color:var(--primary-light);font-weight:600;">Decouvrir les evenements</a></p>
          </div>`;
        return;
      }
      container.innerHTML = orders.map(o => {
        const date = new Date(o.createdAt).toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' });
        const statusClass = o.status === 'completed' ? 'completed' : 'pending';
        const statusLabel = o.status === 'completed' ? 'Confirme' : 'En attente';
        const productsHtml = (o.products || []).map(p => `
          <div class="order-product">
            <span class="order-product-name">${p.name}</span>
            <span class="order-product-qty">x${p.quantity}</span>
            <span class="order-product-price">${((p.price * p.quantity) / 100).toFixed(2)} &euro;</span>
          </div>
        `).join('');
        const total = ((o.amount || 0) / 100).toFixed(2);
        const deliveryHtml = o.status === 'completed' ? `
          <div class="order-delivery">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
            Billets envoyes par email — Verifiez vos spams si besoin
          </div>` : `
          <div class="order-delivery" style="border-color:rgba(234,179,8,0.2);color:#facc15;background:rgba(234,179,8,0.06);">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            Paiement en attente de confirmation
          </div>`;

        return `
          <div class="order-card">
            <div class="order-top">
              <div>
                <span class="order-id">Commande #${o.id}</span>
                <span class="order-date"> — ${date}</span>
              </div>
              <span class="order-status ${statusClass}"><span class="order-status-dot"></span>${statusLabel}</span>
            </div>
            <div class="order-products">${productsHtml}</div>
            <div class="order-total">
              <span>Total</span>
              <span>${total} &euro;</span>
            </div>
            ${deliveryHtml}
          </div>`;
      }).join('');
    }

    // Cart count
    function updateCartCount() {
      try {
        const cart = JSON.parse(localStorage.getItem('vtbCart') || '{"items":[]}');
        const count = cart.items.reduce((sum, item) => sum + item.quantity, 0);
        const el = document.getElementById('cartCount');
        if (el) { if (count > 0) { el.textContent = count; el.style.display = 'flex'; } else { el.style.display = 'none'; } }
      } catch {}
    }

    // Mobile menu
    const menuToggle = document.getElementById('menuToggle');
    if (menuToggle) {
      menuToggle.addEventListener('click', () => {
        const nav = document.getElementById('mobileNav');
        if (nav) nav.classList.toggle('open');
      });
    }

    // Header scroll
    window.addEventListener('scroll', () => {
      document.getElementById('header')?.classList.toggle('scrolled', window.scrollY > 20);
    });

    init();
  </script>
</body>
</html>
