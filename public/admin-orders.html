<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Commandes — ViteTonBillet Admin</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #050033; color: white; padding: 20px; }
    .container { max-width: 1200px; margin: 0 auto; }
    .header { margin-bottom: 40px; }
    .header h1 { font-size: 2.5rem; margin-bottom: 10px; }
    .header p { color: rgba(255,255,255,0.6); }
    .auth-form { max-width: 400px; margin-bottom: 40px; }
    .auth-form input { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); color: white; border-radius: 8px; font-family: inherit; }
    .auth-form button { width: 100%; padding: 12px; background: #3b82f6; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
    .auth-form button:hover { background: #2563eb; }
    .orders-section { display: none; }
    .orders-section.visible { display: block; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
    .stat-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 20px; border-radius: 12px; }
    .stat-label { color: rgba(255,255,255,0.6); font-size: 0.9rem; margin-bottom: 8px; }
    .stat-value { font-size: 2rem; font-weight: 700; }
    .orders-table { width: 100%; border-collapse: collapse; }
    .orders-table th { text-align: left; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); font-weight: 600; color: rgba(255,255,255,0.8); }
    .orders-table td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .orders-table tr:hover { background: rgba(255,255,255,0.03); }
    .order-row { cursor: pointer; }
    .status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; background: rgba(34,197,94,0.2); color: #22c55e; }
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
    .modal.visible { display: flex; }
    .modal-content { background: #050033; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 30px; max-width: 500px; width: 90%; max-height: 90vh; overflow-y: auto; }
    .modal-close { float: right; font-size: 1.5rem; cursor: pointer; color: rgba(255,255,255,0.6); }
    .modal-close:hover { color: white; }
    .modal h2 { margin-bottom: 20px; }
    .order-detail { margin-bottom: 15px; }
    .order-detail-label { color: rgba(255,255,255,0.6); font-size: 0.9rem; }
    .order-detail-value { color: white; font-weight: 500; word-break: break-all; }
    .logout-btn { margin-top: 20px; padding: 8px 16px; background: #ef4444; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
    .logout-btn:hover { background: #dc2626; }
    .empty { text-align: center; padding: 60px 20px; color: rgba(255,255,255,0.5); }
    .loader { text-align: center; padding: 20px; color: rgba(255,255,255,0.5); }
  </style>
</head>
<body>
  <div class="container">
    <!-- AUTH -->
    <div id="authSection">
      <div class="header">
        <h1>🔐 Admin ViteTonBillet</h1>
        <p>Commandes & Ventes</p>
      </div>
      <div class="auth-form">
        <input type="password" id="adminPassword" placeholder="Mot de passe admin" />
        <button onclick="login()">Se connecter</button>
      </div>
    </div>

    <!-- ORDERS -->
    <div id="ordersSection" class="orders-section">
      <div class="header">
        <h1>📊 Commandes</h1>
        <p>Toutes les ventes enregistrées</p>
      </div>

      <div class="stats">
        <div class="stat-card">
          <div class="stat-label">Total commandes</div>
          <div class="stat-value" id="totalOrders">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Revenu total</div>
          <div class="stat-value" id="totalRevenue">€0.00</div>
        </div>
      </div>

      <div id="ordersContainer">
        <div class="loader">Chargement...</div>
      </div>

      <button class="logout-btn" onclick="logout()">Déconnexion</button>
    </div>
  </div>

  <!-- MODAL -->
  <div id="orderModal" class="modal" onclick="if(event.target === this) closeModal()">
    <div class="modal-content">
      <span class="modal-close" onclick="closeModal()">&times;</span>
      <h2>Détails de la commande</h2>
      <div id="modalBody"></div>
    </div>
  </div>

  <script>
    let isAuthenticated = false;
    let allOrders = [];

    function setAuthHeader() {
      return { 'x-admin-password': document.getElementById('adminPassword').value };
    }

    async function login() {
      const password = document.getElementById('adminPassword').value;
      if (!password) {
        alert('Veuillez entrer un mot de passe');
        return;
      }

      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });

        if (!res.ok) {
          alert('Mot de passe incorrect');
          return;
        }

        isAuthenticated = true;
        document.getElementById('authSection').style.display = 'none';
        document.getElementById('ordersSection').classList.add('visible');
        loadOrders();
      } catch (err) {
        alert('Erreur : ' + err.message);
      }
    }

    async function loadOrders() {
      try {
        const res = await fetch('/api/admin/orders', {
          headers: setAuthHeader()
        });
        allOrders = await res.json();
        renderOrders();
      } catch (err) {
        document.getElementById('ordersContainer').innerHTML = '<div class="empty">Erreur: ' + err.message + '</div>';
      }
    }

    function renderOrders() {
      const container = document.getElementById('ordersContainer');

      // Stats
      document.getElementById('totalOrders').textContent = allOrders.length;
      const totalRevenue = allOrders.reduce((sum, o) => sum + (o.amount || 0), 0);
      document.getElementById('totalRevenue').textContent = '€' + (totalRevenue / 100).toFixed(2);

      if (allOrders.length === 0) {
        container.innerHTML = '<div class="empty">Aucune commande pour le moment</div>';
        return;
      }

      const html = `
        <table class="orders-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Client</th>
              <th>Email</th>
              <th>Montant</th>
              <th>Date</th>
              <th>Statut</th>
            </tr>
          </thead>
          <tbody>
            ${allOrders.map(order => `
              <tr class="order-row" onclick="openOrderModal(${order.id})">
                <td>#${order.id}</td>
                <td>${order.customerName || 'N/A'}</td>
                <td>${order.customerEmail || 'N/A'}</td>
                <td>€${(order.amount / 100).toFixed(2)}</td>
                <td>${new Date(order.createdAt).toLocaleDateString('fr-FR', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' })}</td>
                <td><span class="status-badge">${order.status}</span></td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
      container.innerHTML = html;
    }

    async function openOrderModal(orderId) {
      const order = allOrders.find(o => o.id === orderId);
      if (!order) return;

      const html = `
        <div class="order-detail">
          <div class="order-detail-label">ID Commande</div>
          <div class="order-detail-value">#${order.id}</div>
        </div>
        <div class="order-detail">
          <div class="order-detail-label">Client</div>
          <div class="order-detail-value">${order.customerName || 'N/A'}</div>
        </div>
        <div class="order-detail">
          <div class="order-detail-label">Email</div>
          <div class="order-detail-value">${order.customerEmail || 'N/A'}</div>
        </div>
        <div class="order-detail">
          <div class="order-detail-label">Montant</div>
          <div class="order-detail-value">€${(order.amount / 100).toFixed(2)}</div>
        </div>
        <div class="order-detail">
          <div class="order-detail-label">Produits</div>
          <div class="order-detail-value">
            ${(order.products || []).map(p => `<div>• ${p.name} (x${p.quantity})</div>`).join('')}
          </div>
        </div>
        <div class="order-detail">
          <div class="order-detail-label">Date</div>
          <div class="order-detail-value">${new Date(order.createdAt).toLocaleDateString('fr-FR', { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' })}</div>
        </div>
        <div class="order-detail">
          <div class="order-detail-label">Statut</div>
          <div class="order-detail-value"><span class="status-badge">${order.status}</span></div>
        </div>
        <div class="order-detail">
          <div class="order-detail-label">Payment ID</div>
          <div class="order-detail-value">${order.paymentId}</div>
        </div>
      `;

      document.getElementById('modalBody').innerHTML = html;
      document.getElementById('orderModal').classList.add('visible');
    }

    function closeModal() {
      document.getElementById('orderModal').classList.remove('visible');
    }

    function logout() {
      isAuthenticated = false;
      document.getElementById('authSection').style.display = 'block';
      document.getElementById('ordersSection').classList.remove('visible');
      document.getElementById('adminPassword').value = '';
      allOrders = [];
    }
  </script>
</body>
</html>
