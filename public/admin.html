<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — ViteTonBillet</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --white: #fff;
      --gray-50: #f8fafc;
      --gray-100: #f1f5f9;
      --gray-200: #e2e8f0;
      --gray-300: #cbd5e1;
      --gray-400: #94a3b8;
      --gray-500: #64748b;
      --gray-600: #475569;
      --gray-700: #334155;
      --gray-800: #1e293b;
      --gray-900: #0f172a;
      --primary: #2a8cb5;
      --primary-light: #3ba3cf;
      --primary-dark: #1e7a9e;
      --primary-50: #eef8fc;
      --primary-100: #d5effa;
      --danger: #ef4444;
      --danger-bg: #fef2f2;
      --success: #22c55e;
      --radius: 12px;
      --shadow: 0 4px 20px rgba(0,0,0,0.06);
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--gray-50);
      color: var(--gray-800);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-card {
      background: white;
      border: 1px solid var(--gray-200);
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: var(--shadow);
      text-align: center;
    }

    .login-card .logo-mark {
      width: 48px; height: 48px;
      background: var(--primary);
      color: white;
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 1.4rem;
      margin-bottom: 16px;
    }

    .login-card h1 {
      font-size: 1.3rem;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .login-card p {
      color: var(--gray-500);
      font-size: 0.9rem;
      margin-bottom: 24px;
    }

    .login-card input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--gray-200);
      border-radius: 10px;
      font-size: 0.9rem;
      font-family: inherit;
      margin-bottom: 16px;
      outline: none;
      transition: border-color 0.2s;
    }

    .login-card input:focus { border-color: var(--primary-light); }

    .login-card button {
      width: 100%;
      padding: 12px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.9rem;
      transition: background 0.2s;
    }

    .login-card button:hover { background: var(--primary-dark); }

    /* DASHBOARD */
    .dashboard { display: none; }
    .dashboard.visible { display: block; }

    .dashboard-header {
      background: var(--primary);
      color: white;
      padding: 24px;
      margin-bottom: 24px;
      border-radius: 12px;
    }

    .dashboard-header h1 { font-size: 1.8rem; margin-bottom: 4px; }
    .dashboard-header p { opacity: 0.9; font-size: 0.9rem; }

    .tab-nav {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      border-bottom: 2px solid var(--gray-200);
    }

    .tab-btn {
      padding: 12px 20px;
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      cursor: pointer;
      font-weight: 600;
      color: var(--gray-500);
      transition: all 0.2s;
      font-size: 0.95rem;
    }

    .tab-btn.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }

    .tab-btn:hover { color: var(--gray-700); }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover { background: var(--primary-dark); }

    .btn-danger {
      background: var(--danger);
      color: white;
    }

    .btn-danger:hover { background: #dc2626; }

    .logout-btn {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 16px;
      background: var(--danger);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }

    .logout-btn:hover { background: #dc2626; }

    /* EVENTS SECTION */
    .events-list { margin-top: 20px; }

    .event-item {
      background: white;
      border: 1px solid var(--gray-200);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .event-info { flex: 1; }
    .event-info h3 { font-size: 1rem; margin-bottom: 4px; }
    .event-info p { color: var(--gray-500); font-size: 0.85rem; }

    .event-actions { display: flex; gap: 8px; }

    /* ORDERS SECTION */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: white;
      border: 1px solid var(--gray-200);
      border-radius: 12px;
      padding: 20px;
    }

    .stat-label { color: var(--gray-500); font-size: 0.85rem; margin-bottom: 8px; }
    .stat-value { font-size: 2rem; font-weight: 700; color: var(--primary); }

    .orders-table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .orders-table th {
      background: var(--gray-50);
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid var(--gray-200);
      font-weight: 600;
      color: var(--gray-700);
    }

    .orders-table td {
      padding: 12px;
      border-bottom: 1px solid var(--gray-200);
    }

    .orders-table tr:hover { background: var(--gray-50); }

    .order-row { cursor: pointer; }

    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      background: rgba(34,197,94,0.1);
      color: var(--success);
    }

    /* MODAL */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .modal.visible { display: flex; }

    .modal-content {
      background: white;
      border-radius: 16px;
      padding: 32px;
      max-width: 600px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: var(--shadow);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .modal-close {
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: var(--gray-400);
    }

    .modal-close:hover { color: var(--gray-700); }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--gray-700);
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 10px;
      border: 1.5px solid var(--gray-200);
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      border-color: var(--primary);
    }

    .form-group textarea { resize: vertical; min-height: 100px; }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--gray-500);
    }

    .empty-state svg { margin-bottom: 16px; opacity: 0.3; }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div id="loginPage" class="login-page">
    <div class="login-card">
      <div class="logo-mark">🔐</div>
      <h1>Admin ViteTonBillet</h1>
      <p>Gestion complète de ta billetterie</p>
      <input type="password" id="adminPassword" placeholder="Mot de passe admin" />
      <button onclick="login()">Se connecter</button>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" class="dashboard">
    <div class="dashboard-header">
      <h1>🎫 ViteTonBillet Admin</h1>
      <p>Gestion des événements et commandes</p>
    </div>

    <div class="container">
      <div class="tab-nav">
        <button class="tab-btn active" onclick="switchTab('events')">🎵 Événements</button>
        <button class="tab-btn" onclick="switchTab('orders')">📦 Commandes</button>
        <div style="flex: 1;"></div>
        <button class="logout-btn" onclick="logout()">Déconnexion</button>
      </div>

      <!-- EVENTS TAB -->
      <div id="events" class="tab-content active">
        <button class="btn btn-primary" onclick="openEventModal()" style="margin-bottom: 20px;">
          ➕ Ajouter un événement
        </button>
        <div id="eventsList" class="events-list">
          <div class="empty-state">Chargement...</div>
        </div>
      </div>

      <!-- ORDERS TAB -->
      <div id="orders" class="tab-content">
        <div class="stats">
          <div class="stat-card">
            <div class="stat-label">Total commandes</div>
            <div class="stat-value" id="totalOrders">0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Revenu total</div>
            <div class="stat-value" id="totalRevenue">€0.00</div>
          </div>
        </div>
        <div id="ordersContainer">
          <div class="empty-state">Chargement...</div>
        </div>
      </div>
    </div>
  </div>

  <!-- EVENT MODAL -->
  <div id="eventModal" class="modal" onclick="if(event.target === this) closeEventModal()">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitle">Ajouter un événement</h2>
        <button class="modal-close" onclick="closeEventModal()">&times;</button>
      </div>
      <div id="eventFormContainer"></div>
    </div>
  </div>

  <!-- ORDER MODAL -->
  <div id="orderModal" class="modal" onclick="if(event.target === this) closeOrderModal()">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Détails de la commande</h2>
        <button class="modal-close" onclick="closeOrderModal()">&times;</button>
      </div>
      <div id="orderModalBody"></div>
    </div>
  </div>

  <script>
    let isAuthenticated = false;
    let allEvents = [];
    let allOrders = [];
    let currentEventId = null;

    function setAuthHeader() {
      return { 'x-admin-password': document.getElementById('adminPassword').value };
    }

    // ============ AUTH ============
    async function login() {
      const password = document.getElementById('adminPassword').value;
      if (!password) {
        alert('Veuillez entrer un mot de passe');
        return;
      }

      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });

        if (!res.ok) {
          alert('Mot de passe incorrect');
          return;
        }

        isAuthenticated = true;
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('dashboard').classList.add('visible');
        loadEvents();
        loadOrders();
      } catch (err) {
        alert('Erreur : ' + err.message);
      }
    }

    function logout() {
      isAuthenticated = false;
      document.getElementById('loginPage').style.display = 'flex';
      document.getElementById('dashboard').classList.remove('visible');
      document.getElementById('adminPassword').value = '';
      allEvents = [];
      allOrders = [];
    }

    // ============ TABS ============
    function switchTab(tabName) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
      document.getElementById(tabName).classList.add('active');
      event.target.classList.add('active');
    }

    // ============ EVENTS ============
    async function loadEvents() {
      try {
        const res = await fetch('/api/events');
        allEvents = await res.json();
        renderEvents();
      } catch (err) {
        document.getElementById('eventsList').innerHTML = '<div class="empty-state">Erreur: ' + err.message + '</div>';
      }
    }

    function renderEvents() {
      const container = document.getElementById('eventsList');
      if (allEvents.length === 0) {
        container.innerHTML = '<div class="empty-state">Aucun événement</div>';
        return;
      }

      const html = allEvents.map(event => `
        <div class="event-item">
          <div class="event-info">
            <h3>${event.name}${event.artist ? ' — ' + event.artist : ''}</h3>
            <p>${event.location} • ${event.date}</p>
          </div>
          <div class="event-actions">
            <button class="btn btn-primary" onclick="editEvent(${event.id})">✏️ Modifier</button>
            <button class="btn btn-danger" onclick="deleteEvent(${event.id})">🗑️ Supprimer</button>
          </div>
        </div>
      `).join('');
      container.innerHTML = html;
    }

    function openEventModal(eventId = null) {
      currentEventId = eventId;
      const event = eventId ? allEvents.find(e => e.id === eventId) : null;

      const form = `
        <div class="form-group">
          <label>Nom de l'événement *</label>
          <input type="text" id="eventName" placeholder="Ex: Sabrina Carpenter" value="${event?.name || ''}" />
        </div>
        <div class="form-group">
          <label>Artiste</label>
          <input type="text" id="eventArtist" placeholder="Ex: Sabrina Carpenter" value="${event?.artist || ''}" />
        </div>
        <div class="form-group">
          <label>Date *</label>
          <input type="date" id="eventDate" value="${event?.date || ''}" />
        </div>
        <div class="form-group">
          <label>Heure</label>
          <input type="time" id="eventTime" value="${event?.time || ''}" />
        </div>
        <div class="form-group">
          <label>Lieu *</label>
          <input type="text" id="eventLocation" placeholder="Ex: AccorArena" value="${event?.location || ''}" />
        </div>
        <div class="form-group">
          <label>Catégorie *</label>
          <input type="text" id="eventCategory" placeholder="Ex: Concert" value="${event?.category || ''}" />
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea id="eventDescription">${event?.description || ''}</textarea>
        </div>
        <div class="form-group">
          <label>Image URL</label>
          <input type="text" id="eventImage" placeholder="https://" value="${event?.image || ''}" />
        </div>
        <div id="ticketsContainer">${renderTicketsForm(event?.tickets || [])}</div>
        <button class="btn btn-primary" style="margin: 16px 0 0 0;" onclick="addTicketType()">+ Ajouter type de billet</button>
        <div style="margin-top: 20px;">
          <button class="btn btn-primary" onclick="saveEvent()" style="width: 100%;">${eventId ? 'Mettre à jour' : 'Créer'} l'événement</button>
        </div>
      `;

      document.getElementById('modalTitle').textContent = eventId ? 'Modifier l\'événement' : 'Ajouter un événement';
      document.getElementById('eventFormContainer').innerHTML = form;
      document.getElementById('eventModal').classList.add('visible');
    }

    function renderTicketsForm(tickets) {
      if (tickets.length === 0) {
        return `
          <div class="form-group" style="border: 1px solid var(--gray-200); padding: 16px; border-radius: 8px;">
            <h4 style="margin-bottom: 12px;">Types de billets</h4>
            <div class="ticket-row" style="display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 8px; margin-bottom: 8px;">
              <input type="text" placeholder="Type (VIP, Normal...)" class="ticket-type" value="" />
              <input type="number" placeholder="Prix (€)" class="ticket-price" value="" />
              <select class="ticket-currency"><option value="EUR">EUR</option><option value="USD">USD</option></select>
              <button class="btn btn-danger" onclick="removeTicketRow(this)">✕</button>
            </div>
          </div>
        `;
      }

      return `
        <div class="form-group" style="border: 1px solid var(--gray-200); padding: 16px; border-radius: 8px;">
          <h4 style="margin-bottom: 12px;">Types de billets</h4>
          ${tickets.map((t, i) => `
            <div class="ticket-row" style="display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 8px; margin-bottom: 8px;">
              <input type="text" placeholder="Type" class="ticket-type" value="${t.type}" />
              <input type="number" placeholder="Prix" class="ticket-price" value="${t.price}" />
              <select class="ticket-currency"><option value="EUR" ${t.currency === 'EUR' ? 'selected' : ''}>EUR</option><option value="USD" ${t.currency === 'USD' ? 'selected' : ''}>USD</option></select>
              <button class="btn btn-danger" onclick="removeTicketRow(this)">✕</button>
            </div>
          `).join('')}
        </div>
      `;
    }

    function addTicketType() {
      const container = document.getElementById('ticketsContainer');
      const html = container.innerHTML;
      const newRow = `<div class="ticket-row" style="display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 8px; margin-bottom: 8px;"><input type="text" placeholder="Type" class="ticket-type" /><input type="number" placeholder="Prix" class="ticket-price" /><select class="ticket-currency"><option value="EUR">EUR</option><option value="USD">USD</option></select><button class="btn btn-danger" onclick="removeTicketRow(this)">✕</button></div>`;
      const endDiv = html.lastIndexOf('</div>');
      container.innerHTML = html.substring(0, endDiv) + newRow + html.substring(endDiv);
    }

    function removeTicketRow(btn) {
      btn.parentElement.remove();
    }

    async function saveEvent() {
      const name = document.getElementById('eventName').value.trim();
      const date = document.getElementById('eventDate').value;
      const location = document.getElementById('eventLocation').value.trim();
      const category = document.getElementById('eventCategory').value.trim();

      if (!name || !date || !location || !category) {
        alert('Veuillez remplir les champs obligatoires');
        return;
      }

      const tickets = Array.from(document.querySelectorAll('.ticket-row')).map(row => ({
        type: row.querySelector('.ticket-type').value,
        price: parseInt(row.querySelector('.ticket-price').value || '0'),
        currency: row.querySelector('.ticket-currency').value
      }));

      if (tickets.length === 0) {
        alert('Ajouter au moins un type de billet');
        return;
      }

      const payload = {
        name,
        artist: document.getElementById('eventArtist').value.trim(),
        date,
        time: document.getElementById('eventTime').value,
        location,
        category,
        description: document.getElementById('eventDescription').value.trim(),
        image: document.getElementById('eventImage').value.trim(),
        tickets
      };

      try {
        const method = currentEventId ? 'PUT' : 'POST';
        const url = currentEventId ? `/api/admin/events/${currentEventId}` : '/api/admin/events';

        const res = await fetch(url, {
          method,
          headers: { ...setAuthHeader(), 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (!res.ok) throw new Error('Erreur serveur');

        closeEventModal();
        loadEvents();
        alert(currentEventId ? 'Événement modifié' : 'Événement créé');
      } catch (err) {
        alert('Erreur: ' + err.message);
      }
    }

    function editEvent(eventId) {
      openEventModal(eventId);
    }

    async function deleteEvent(eventId) {
      if (!confirm('Supprimer cet événement ?')) return;

      try {
        const res = await fetch(`/api/admin/events/${eventId}`, {
          method: 'DELETE',
          headers: setAuthHeader()
        });

        if (!res.ok) throw new Error('Erreur');
        loadEvents();
        alert('Événement supprimé');
      } catch (err) {
        alert('Erreur: ' + err.message);
      }
    }

    function closeEventModal() {
      document.getElementById('eventModal').classList.remove('visible');
      currentEventId = null;
    }

    // ============ ORDERS ============
    async function loadOrders() {
      try {
        const res = await fetch('/api/admin/orders', {
          headers: setAuthHeader()
        });
        allOrders = await res.json();
        renderOrders();
      } catch (err) {
        document.getElementById('ordersContainer').innerHTML = '<div class="empty-state">Erreur: ' + err.message + '</div>';
      }
    }

    function renderOrders() {
      const container = document.getElementById('ordersContainer');

      document.getElementById('totalOrders').textContent = allOrders.length;
      const totalRevenue = allOrders.reduce((sum, o) => sum + (o.amount || 0), 0);
      document.getElementById('totalRevenue').textContent = '€' + (totalRevenue / 100).toFixed(2);

      if (allOrders.length === 0) {
        container.innerHTML = '<div class="empty-state">Aucune commande pour le moment</div>';
        return;
      }

      const html = `
        <table class="orders-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Client</th>
              <th>Email</th>
              <th>Montant</th>
              <th>Date</th>
              <th>Statut</th>
            </tr>
          </thead>
          <tbody>
            ${allOrders.map(order => `
              <tr class="order-row" onclick="openOrderModal(${order.id})">
                <td>#${order.id}</td>
                <td>${order.customerName || 'N/A'}</td>
                <td>${order.customerEmail || 'N/A'}</td>
                <td>€${(order.amount / 100).toFixed(2)}</td>
                <td>${new Date(order.createdAt).toLocaleDateString('fr-FR')}</td>
                <td><span class="status-badge">${order.status}</span></td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
      container.innerHTML = html;
    }

    function openOrderModal(orderId) {
      const order = allOrders.find(o => o.id === orderId);
      if (!order) return;

      const html = `
        <div style="margin-bottom: 16px;">
          <h3 style="margin-bottom: 12px;">Infos client</h3>
          <p><strong>Nom:</strong> ${order.customerName || 'N/A'}</p>
          <p><strong>Email:</strong> ${order.customerEmail || 'N/A'}</p>
          <p><strong>Montant:</strong> €${(order.amount / 100).toFixed(2)}</p>
        </div>
        <div style="margin-bottom: 16px;">
          <h3 style="margin-bottom: 12px;">Produits</h3>
          ${(order.products || []).map(p => `<p>• ${p.name} (x${p.quantity})</p>`).join('')}
        </div>
        <div>
          <h3 style="margin-bottom: 12px;">Détails</h3>
          <p><strong>Date:</strong> ${new Date(order.createdAt).toLocaleDateString('fr-FR', { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' })}</p>
          <p><strong>Statut:</strong> <span class="status-badge">${order.status}</span></p>
          <p><strong>Payment ID:</strong> ${order.paymentId}</p>
        </div>
      `;

      document.getElementById('orderModalBody').innerHTML = html;
      document.getElementById('orderModal').classList.add('visible');
    }

    function closeOrderModal() {
      document.getElementById('orderModal').classList.remove('visible');
    }
  </script>

</body>
</html>
