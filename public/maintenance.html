<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maintenance en cours — ViteTonBillet</title>
  <meta name="robots" content="noindex, nofollow" />
  <meta name="description" content="ViteTonBillet est temporairement en maintenance. Nous revenons tr&egrave;s vite." />
  <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/images/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/images/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: #ffffff;
      background: #050033;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      background: radial-gradient(ellipse at 20% 50%, #0a0550 0%, #050033 100%);
    }
    .glow {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.55;
      animation: floaty 14s ease-in-out infinite;
    }
    .g1 { width: 520px; height: 520px; top: -12%; left: -6%;
      background: radial-gradient(circle, rgba(59,130,246,0.5) 0%, transparent 70%); animation-duration: 16s; }
    .g2 { width: 420px; height: 420px; bottom: -12%; right: -8%;
      background: radial-gradient(circle, rgba(139,92,246,0.4) 0%, transparent 70%); animation-duration: 12s; animation-delay: -4s; }
    .g3 { width: 320px; height: 320px; top: 45%; left: 50%; transform: translateX(-50%);
      background: radial-gradient(circle, rgba(59,130,246,0.28) 0%, transparent 70%); animation-duration: 18s; animation-delay: -8s; }
    @keyframes floaty {
      0%, 100% { transform: translate(0,0) scale(1); }
      25% { transform: translate(30px,-20px) scale(1.05); }
      50% { transform: translate(-20px,15px) scale(0.95); }
      75% { transform: translate(15px,25px) scale(1.02); }
    }

    .wrap {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
      text-align: center;
    }

    .card {
      max-width: 620px;
      width: 100%;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 40px;
      font-weight: 800;
      font-size: 1.15rem;
    }
    .logo img { width: 44px; height: 44px; border-radius: 10px; }
    .logo-text { color: white; letter-spacing: -0.01em; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 16px;
      background: rgba(245,158,11,0.15);
      border: 1px solid rgba(245,158,11,0.35);
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 700;
      color: #fbbf24;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 24px;
    }
    .badge .dot {
      width: 8px;
      height: 8px;
      background: #fbbf24;
      border-radius: 50%;
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: -0.03em;
      margin-bottom: 20px;
    }
    h1 .highlight {
      background: linear-gradient(135deg, #60a5fa, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .lead {
      color: rgba(255,255,255,0.7);
      font-size: 1.05rem;
      line-height: 1.7;
      margin-bottom: 12px;
    }
    .custom-msg {
      color: rgba(255,255,255,0.85);
      font-size: 1rem;
      line-height: 1.7;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 16px 20px;
      margin: 24px auto 0;
      max-width: 500px;
      backdrop-filter: blur(10px);
    }

    .cta-row {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 36px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 13px 24px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 0.92rem;
      text-decoration: none;
      transition: transform 0.15s ease, background 0.15s ease;
    }
    .btn-primary {
      background: white;
      color: #050033;
    }
    .btn-primary:hover { transform: translateY(-2px); }
    .btn-ghost {
      background: rgba(255,255,255,0.1);
      color: white;
      border: 1px solid rgba(255,255,255,0.15);
    }
    .btn-ghost:hover { background: rgba(255,255,255,0.18); }

    .foot {
      margin-top: 48px;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.4);
    }
  </style>
</head>
<body>
  <div class="bg" aria-hidden="true">
    <div class="glow g1"></div>
    <div class="glow g2"></div>
    <div class="glow g3"></div>
  </div>

  <div class="wrap">
    <div class="card">
      <div class="logo">
        <img src="/images/logo-128.png" alt="ViteTonBillet" />
        <span class="logo-text">ViteTonBillet</span>
      </div>

      <div class="badge">
        <span class="dot"></span>
        Maintenance en cours
      </div>

      <h1>On revient <span class="highlight">tr&egrave;s vite</span>.</h1>
      <p class="lead">Le site est temporairement indisponible pendant qu'on am&eacute;liore quelques trucs.<br/>Merci de ta patience !</p>

      <div id="customMsg" class="custom-msg" style="display:none"></div>

      <div class="cta-row">
        <a href="https://x.com/Vitetonbillet" target="_blank" rel="noopener" class="btn btn-primary">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
          Nous contacter sur X
        </a>
        <a href="mailto:contact@vitetonbillet.com" class="btn btn-ghost">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="22,6 12,13 2,6"/></svg>
          Par email
        </a>
      </div>

      <p class="foot">&copy; 2026 ViteTonBillet</p>
    </div>
  </div>

  <script>
    // R&eacute;cup&egrave;re le message custom depuis l'API
    fetch('/api/maintenance-status').then(function(r) { return r.json(); }).then(function(d) {
      if (d && d.message) {
        var box = document.getElementById('customMsg');
        box.textContent = d.message;
        box.style.display = 'block';
      }
    }).catch(function(){});
  </script>
</body>
</html>
